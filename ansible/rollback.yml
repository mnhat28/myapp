- name: Rollback myapp to previous version
  hosts: target_nodes
  become: yes
  tasks:
    - name: Stop current container
      docker_container:
        name: myapp
        state: absent

    - name: Run previous version of container
      docker_container:
        name: myapp
        image: "{{ docker_user }}/myapp:previous"
        state: started
        restart_policy: always
        published_ports:
          - "80:80"

